<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>EWO x TeleOnce - Neon Glass Rojo</title>
    <style>
        /* Página transparente */
        body {
            margin: 0;
            height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            background-color: transparent; 
            font-family: 'Inter', 'Segoe UI', sans-serif;
        }

        /* Cuadro principal oscurecido */
        .glass-box {
            display: flex;
            align-items: center;
            background: rgba(0, 0, 0, 0.85); /* Un poco más oscuro para que resalte el rojo */
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            
            padding: 35px 60px;
            border-radius: 20px; 
            
            /* Bordes Neón Rojo */
            border: 2px solid #ff0000;
            box-shadow: 0 0 25px rgba(255, 0, 0, 0.6), 
                        inset 0 0 10px rgba(255, 0, 0, 0.3);
            
            color: white;
            gap: 50px;
        }

        /* Lado del Texto */
        .info h1 {
            margin: 0;
            font-size: 32px;
            font-weight: 900;
            text-transform: uppercase;
            letter-spacing: -1px;
            color: #ff0000; /* Texto principal en rojo */
            text-shadow: 0 0 10px rgba(255, 0, 0, 0.5);
        }

        .info p {
            margin: 5px 0 0;
            font-size: 17px;
            color: #eee;
        }

        /* Línea Divisora Neón Roja */
        .divider {
            width: 2px;
            height: 80px;
            background: #ff0000;
            box-shadow: 0 0 12px #ff0000;
            opacity: 0.7;
        }

        /* Lado del Contador */
        .timer {
            display: flex;
            gap: 30px;
            text-align: center;
        }

        .time-group {
            display: flex;
            flex-direction: column;
        }

        .time-group b {
            font-size: 48px;
            font-weight: 900;
            line-height: 1;
            color: #ffffff;
            /* Brillo blanco con aura roja */
            text-shadow: 0 0 15px rgba(255, 0, 0, 0.7);
        }

        .time-group span {
            font-size: 11px;
            text-transform: uppercase;
            margin-top: 8px;
            letter-spacing: 2px;
            color: #ff0000; /* Etiquetas en rojo */
            font-weight: 600;
        }
    </style>
</head>
<body>

    <div class="glass-box">
        <div class="info">
            <h1>Planeta Alofoke</h1>
            <p>12 de abril • 2:00 PM</p>
        </div>

        <div class="divider"></div>

        <div class="timer">
            <div class="time-group">
                <b id="days">00</b>
                <span>Días</span>
            </div>
            <div class="time-group">
                <b id="hours">00</b>
                <span>Hrs</span>
            </div>
            <div class="time-group">
                <b id="mins">00</b>
                <span>Min</span>
            </div>
            <div class="time-group">
                <b id="secs">00</b>
                <span>Seg</span>
            </div>
        </div>
    </div>

    <script>
        // Configuración para el 12 de Abril a las 2:00 PM (14:00 horas)
        // Nota: Los meses en JS empiezan desde 0 (Abril = 3)
        // Se asume el año actual o el próximo 12 de abril disponible
        const currentYear = new Date().getFullYear();
        let targetDate = new Date(currentYear, 3, 12, 14, 0, 0).getTime();
        
        // Si la fecha ya pasó este año, ponerla para el próximo
        if (new Date().getTime() > targetDate) {
            targetDate = new Date(currentYear + 1, 3, 12, 14, 0, 0).getTime();
        }

        function countdown() {
            const now = new Date().getTime();
            const gap = targetDate - now;

            if (gap <= 0) {
                document.querySelector(".timer").innerHTML = "<b style='color:#ff0000; font-size:30px; text-shadow: 0 0 10px rgba(255,0,0,0.5);'>¡AL AIRE!</b>";
                return;
            }

            const d = Math.floor(gap / (1000 * 60 * 60 * 24));
            const h = Math.floor((gap % (1000 * 60 * 60 * 24)) / (1000 * 60 * 60));
            const m = Math.floor((gap % (1000 * 60 * 60)) / (1000 * 60));
            const s = Math.floor((gap % (1000 * 60)) / 1000);

            document.getElementById("days").innerText = d < 10 ? "0" + d : d;
            document.getElementById("hours").innerText = h < 10 ? "0" + h : h;
            document.getElementById("mins").innerText = m < 10 ? "0" + m : m;
            document.getElementById("secs").innerText = s < 10 ? "0" + s : s;
        }

        setInterval(countdown, 1000);
        countdown();
    </script>
</body>
</html>
