<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>EWO El Update x TeleOnce</title>
    <style>
        /* Página transparente */
        body {
            margin: 0;
            height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            background-color: transparent; 
            font-family: 'Inter', 'Segoe UI', sans-serif;
        }

        /* Cuadro principal en Dorado/Bronce */
        .glass-box {
            display: flex;
            align-items: center;
            background: rgba(15, 12, 8, 0.9); /* Fondo casi negro con toque cálido */
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            
            padding: 35px 60px;
            border-radius: 15px; 
            
            /* Borde Dorado Metálico */
            border: 2px solid #c5a059;
            box-shadow: 0 0 30px rgba(197, 160, 89, 0.4), 
                        inset 0 0 15px rgba(197, 160, 89, 0.2);
            
            color: white;
            gap: 50px;
        }

        /* Lado del Texto */
        .info h1 {
            margin: 0;
            font-size: 32px;
            font-weight: 900;
            text-transform: uppercase;
            letter-spacing: 1px;
            /* Degradado dorado en el texto */
            background: linear-gradient(to bottom, #f9e2af 0%, #c5a059 50%, #8a6e2f 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            filter: drop-shadow(0 2px 4px rgba(0,0,0,0.5));
        }

        .info p {
            margin: 5px 0 0;
            font-size: 16px;
            font-weight: 400;
            color: #d1b88a; 
            text-transform: uppercase;
            letter-spacing: 3px;
        }

        /* Línea Divisora Dorada */
        .divider {
            width: 2px;
            height: 80px;
            background: linear-gradient(to bottom, transparent, #c5a059, transparent);
            opacity: 0.8;
        }

        /* Lado del Contador */
        .timer {
            display: flex;
            gap: 30px;
            text-align: center;
        }

        .time-group {
            display: flex;
            flex-direction: column;
        }

        .time-group b {
            font-size: 48px;
            font-weight: 900;
            line-height: 1;
            color: #f9e2af;
            text-shadow: 0 0 15px rgba(197, 160, 89, 0.5);
        }

        .time-group span {
            font-size: 11px;
            text-transform: uppercase;
            margin-top: 8px;
            letter-spacing: 2px;
            color: #c5a059; 
            font-weight: 700;
        }
    </style>
</head>
<body>

    <div class="glass-box">
        <div class="info">
            <h1>EWO El Update x TeleOnce</h1>
            <p>MAÑANA • 10:00 AM</p>
        </div>

        <div class="divider"></div>

        <div class="timer">
            <div class="time-group">
                <b id="days">00</b>
                <span>Días</span>
            </div>
            <div class="time-group">
                <b id="hours">00</b>
                <span>Hrs</span>
            </div>
            <div class="time-group">
                <b id="mins">00</b>
                <span>Min</span>
            </div>
            <div class="time-group">
                <b id="secs">00</b>
                <span>Seg</span>
            </div>
        </div>
    </div>

    <script>
        // Fecha objetivo: Mañana (16 de Mayo, 2026) a las 10:00 AM
        const targetDate = new Date("May 16, 2026 10:00:00").getTime();
        
        function countdown() {
            const currentTime = new Date().getTime();
            const gap = targetDate - currentTime;

            if (gap <= 0) {
                document.querySelector(".timer").innerHTML = "<b style='color:#f9e2af; font-size:28px;'>¡AL AIRE!</b>";
                return;
            }

            const d = Math.floor(gap / (1000 * 60 * 60 * 24));
            const h = Math.floor((gap % (1000 * 60 * 60 * 24)) / (1000 * 60 * 60));
            const m = Math.floor((gap % (1000 * 60 * 60)) / (1000 * 60));
            const s = Math.floor((gap % (1000 * 60)) / 1000);

            document.getElementById("days").innerText = d < 10 ? "0" + d : d;
            document.getElementById("hours").innerText = h < 10 ? "0" + h : h;
            document.getElementById("mins").innerText = m < 10 ? "0" + m : m;
            document.getElementById("secs").innerText = s < 10 ? "0" + s : s;
        }

        setInterval(countdown, 1000);
        countdown();
    </script>
</body>
</html>
