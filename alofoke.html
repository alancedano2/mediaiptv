<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>StreamVerse Especial - Cuenta Regresiva</title>
    <style>
        body {
            margin: 0;
            height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            background-color: transparent; 
            font-family: 'Inter', 'Segoe UI', sans-serif;
        }

        .glass-box {
            display: flex;
            align-items: center;
            background: rgba(10, 10, 10, 0.9); 
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            
            padding: 35px 60px;
            border-radius: 20px; 
            
            /* Elegante borde verde neon/estilo VIP */
            border: 2px solid #00FF66;
            box-shadow: 0 0 25px rgba(0, 255, 102, 0.4), 
                        inset 0 0 10px rgba(0, 255, 102, 0.15);
            
            color: white;
            gap: 50px;
        }

        .info h1 {
            margin: 0;
            font-size: 26px;
            font-weight: 900;
            text-transform: uppercase;
            letter-spacing: 0.5px;
            color: #ffffff;
            text-shadow: 0 0 10px rgba(255, 255, 255, 0.3);
        }

        .info .teams {
            color: #00FF66; /* Verde */
            font-size: 28px;
            font-weight: 900;
            margin: 4px 0;
            text-transform: uppercase;
        }

        .info p {
            margin: 8px 0 0;
            font-size: 16px;
            color: #bbb;
            font-weight: 500;
            letter-spacing: 1px;
        }

        .divider {
            width: 2px;
            height: 90px;
            background: #00FF66; /* Verde */
            box-shadow: 0 0 12px #00FF66;
            opacity: 0.7;
        }

        .timer {
            display: flex;
            gap: 30px;
            text-align: center;
        }

        .time-group {
            display: flex;
            flex-direction: column;
        }

        .time-group b {
            font-size: 48px;
            font-weight: 900;
            line-height: 1;
            color: #ffffff;
            text-shadow: 0 0 15px rgba(0, 255, 102, 0.5); 
        }

        .time-group span {
            font-size: 11px;
            text-transform: uppercase;
            margin-top: 8px;
            letter-spacing: 2px;
            color: #00FF66; /* Verde */
            font-weight: 600;
        }
    </style>
</head>
<body>

    <div class="glass-box">
        <div class="info">
            <h1>STREAMVERSE ESPECIAL</h1>
            <div class="teams">Bad Bunny - No me quiero ir de aqui (Versión Repetición)</div>
            <p>HOY • 8:00 PM</p>
        </div>

        <div class="divider"></div>

        <div class="timer">
            <div class="time-group">
                <b id="days">00</b>
                <span>Días</span>
            </div>
            <div class="time-group">
                <b id="hours">00</b>
                <span>Hrs</span>
            </div>
            <div class="time-group">
                <b id="mins">00</b>
                <span>Min</span>
            </div>
            <div class="time-group">
                <b id="secs">00</b>
                <span>Seg</span>
            </div>
        </div>
    </div>

    <script>
        // Configura el evento para este Sábado a las 8:00 PM (20:00)
        const targetDate = new Date(2026, 6, 24, 20, 0, 0, 0); 
        const targetTime = targetDate.getTime();

        function countdown() {
            const currentTime = new Date().getTime();
            const gap = targetTime - currentTime;

            if (gap <= 0) {
                document.querySelector(".timer").innerHTML = "<b style='color:#00FF66; font-size:30px; text-shadow: 0 0 10px rgba(0,255,102,0.5);'>¡TRANSMISIÓN EN VIVO!</b>";
                return;
            }

            const d = Math.floor(gap / (1000 * 60 * 60 * 24));
            const h = Math.floor((gap % (1000 * 60 * 60 * 24)) / (1000 * 60 * 60));
            const m = Math.floor((gap % (1000 * 60 * 60)) / (1000 * 60));
            const s = Math.floor((gap % (1000 * 60)) / 1000);

            document.getElementById("days").innerText = d < 10 ? "0" + d : d;
            document.getElementById("hours").innerText = h < 10 ? "0" + h : h;
            document.getElementById("mins").innerText = m < 10 ? "0" + m : m;
            document.getElementById("secs").innerText = s < 10 ? "0" + s : s;
        }

        setInterval(countdown, 1000);
        countdown();
    </script>
</body>
</html>
