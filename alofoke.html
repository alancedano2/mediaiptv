<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>Jay Wheeler: Mundo Rueditas Live</title>
    <style>
        /* Página transparente */
        body {
            margin: 0;
            height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            background-color: transparent; 
            font-family: 'Inter', 'Segoe UI', sans-serif;
        }

        /* Cuadro principal con estética Mundo Rueditas */
        .glass-box {
            display: flex;
            align-items: center;
            background: rgba(10, 10, 20, 0.85); 
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            
            padding: 35px 60px;
            border-radius: 30px; 
            
            /* Bordes Neón Cyan/Azul */
            border: 2px solid #00f2ff;
            box-shadow: 0 0 25px rgba(0, 242, 255, 0.4), 
                        inset 0 0 15px rgba(0, 242, 255, 0.2);
            
            color: white;
            gap: 50px;
        }

        /* Lado del Texto */
        .info h1 {
            margin: 0;
            font-size: 30px;
            font-weight: 900;
            text-transform: uppercase;
            letter-spacing: 1px;
            color: #00f2ff; 
            text-shadow: 0 0 10px rgba(0, 242, 255, 0.5);
        }

        .info p {
            margin: 5px 0 0;
            font-size: 18px;
            font-weight: 600;
            color: #ff77ff; /* Toque rosado característico */
            text-transform: uppercase;
            letter-spacing: 2px;
        }

        /* Línea Divisora Neón */
        .divider {
            width: 2px;
            height: 80px;
            background: #00f2ff;
            box-shadow: 0 0 12px #00f2ff;
            opacity: 0.5;
        }

        /* Lado del Contador */
        .timer {
            display: flex;
            gap: 30px;
            text-align: center;
        }

        .time-group {
            display: flex;
            flex-direction: column;
        }

        .time-group b {
            font-size: 48px;
            font-weight: 900;
            line-height: 1;
            color: #ffffff;
            text-shadow: 0 0 15px rgba(0, 242, 255, 0.7);
        }

        .time-group span {
            font-size: 11px;
            text-transform: uppercase;
            margin-top: 8px;
            letter-spacing: 2px;
            color: #00f2ff; 
            font-weight: 600;
        }
    </style>
</head>
<body>

    <div class="glass-box">
        <div class="info">
            <h1>MUNDO RUEDITAS LIVE</h1>
            <p>JAY WHEELER • 29 DE MAYO</p>
        </div>

        <div class="divider"></div>

        <div class="timer">
            <div class="time-group">
                <b id="days">00</b>
                <span>Días</span>
            </div>
            <div class="time-group">
                <b id="hours">00</b>
                <span>Hrs</span>
            </div>
            <div class="time-group">
                <b id="mins">00</b>
                <span>Min</span>
            </div>
            <div class="time-group">
                <b id="secs">00</b>
                <span>Seg</span>
            </div>
        </div>
    </div>

    <script>
        // Configuración para el 29 de mayo (Año actual o siguiente según la fecha)
        const currentYear = new Date().getFullYear();
        let eventDate = new Date(`May 29, ${currentYear} 00:00:00`).getTime();
        
        // Si la fecha ya pasó este año, apunta al próximo año
        if (new Date().getTime() > eventDate) {
            eventDate = new Date(`May 29, ${currentYear + 1} 00:00:00`).getTime();
        }

        function countdown() {
            const currentTime = new Date().getTime();
            const gap = eventDate - currentTime;

            if (gap <= 0) {
                document.querySelector(".timer").innerHTML = "<b style='color:#00f2ff; font-size:30px; text-shadow: 0 0 10px rgba(0,242,255,0.5);'>¡HOY ES EL DÍA!</b>";
                return;
            }

            const d = Math.floor(gap / (1000 * 60 * 60 * 24));
            const h = Math.floor((gap % (1000 * 60 * 60 * 24)) / (1000 * 60 * 60));
            const m = Math.floor((gap % (1000 * 60 * 60)) / (1000 * 60));
            const s = Math.floor((gap % (1000 * 60)) / 1000);

            document.getElementById("days").innerText = d < 10 ? "0" + d : d;
            document.getElementById("hours").innerText = h < 10 ? "0" + h : h;
            document.getElementById("mins").innerText = m < 10 ? "0" + m : m;
            document.getElementById("secs").innerText = s < 10 ? "0" + s : s;
        }

        setInterval(countdown, 1000);
        countdown();
    </script>
</body>
</html>
