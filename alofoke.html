<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>EWO El Update x TeleOnce</title>
    <style>
        /* Página transparente */
        body {
            margin: 0;
            height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            background-color: transparent; 
            font-family: 'Inter', 'Segoe UI', sans-serif;
        }

        /* Cuadro principal con estética Amarilla/Negra */
        .glass-box {
            display: flex;
            align-items: center;
            background: rgba(15, 15, 5, 0.88); 
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            
            padding: 35px 60px;
            border-radius: 30px; 
            
            /* Bordes Neón Amarillo */
            border: 2px solid #ffcc00;
            box-shadow: 0 0 25px rgba(255, 204, 0, 0.4), 
                        inset 0 0 15px rgba(255, 204, 0, 0.2);
            
            color: white;
            gap: 50px;
        }

        /* Lado del Texto */
        .info h1 {
            margin: 0;
            font-size: 30px;
            font-weight: 900;
            text-transform: uppercase;
            letter-spacing: 1px;
            color: #ffcc00; 
            text-shadow: 0 0 10px rgba(255, 204, 0, 0.5);
        }

        /* Subtítulo adaptado a la fecha dinámica mediante JS */
        .info p {
            margin: 5px 0 0;
            font-size: 16px;
            font-weight: 700;
            color: #ffffff; /* Blanco para contrastar el amarillo */
            text-transform: uppercase;
            letter-spacing: 2px;
        }

        /* Línea Divisora Neón Amarilla */
        .divider {
            width: 2px;
            height: 80px;
            background: #ffcc00;
            box-shadow: 0 0 12px #ffcc00;
            opacity: 0.5;
        }

        /* Lado del Contador */
        .timer {
            display: flex;
            gap: 30px;
            text-align: center;
        }

        .time-group {
            display: flex;
            flex-direction: column;
        }

        .time-group b {
            font-size: 48px;
            font-weight: 900;
            line-height: 1;
            color: #ffffff;
            text-shadow: 0 0 15px rgba(255, 204, 0, 0.7);
        }

        .time-group span {
            font-size: 11px;
            text-transform: uppercase;
            margin-top: 8px;
            letter-spacing: 2px;
            color: #ffcc00; 
            font-weight: 600;
        }
    </style>
</head>
<body>

    <div class="glass-box">
        <div class="info">
            <h1>EWO EL UPDATE</h1>
            <p>X TELEONCE • HOY 10:00 AM</p>
        </div>

        <div class="divider"></div>

        <div class="timer">
            <div class="time-group">
                <b id="days">00</b>
                <span>Días</span>
            </div>
            <div class="time-group">
                <b id="hours">00</b>
                <span>Hrs</span>
            </div>
            <div class="time-group">
                <b id="mins">00</b>
                <span>Min</span>
            </div>
            <div class="time-group">
                <b id="secs">00</b>
                <span>Seg</span>
            </div>
        </div>
    </div>

    <script>
        // Configuración automática para HOY a las 10:00:00 AM
        const now = new Date();
        const eventDate = new Date(now.getFullYear(), now.getMonth(), now.getDate(), 10, 0, 0).getTime();

        function countdown() {
            const currentTime = new Date().getTime();
            const gap = eventDate - currentTime;

            if (gap <= 0) {
                document.querySelector(".timer").innerHTML = "<b style='color:#ffcc00; font-size:30px; text-shadow: 0 0 10px rgba(255,204,0,0.5);'>¡YA EMPEZÓ!</b>";
                return;
            }

            const d = Math.floor(gap / (1000 * 60 * 60 * 24));
            const h = Math.floor((gap % (1000 * 60 * 60 * 24)) / (1000 * 60 * 60));
            const m = Math.floor((gap % (1000 * 60 * 60)) / (1000 * 60));
            const s = Math.floor((gap % (1000 * 60)) / 1000);

            document.getElementById("days").innerText = d < 10 ? "0" + d : d;
            document.getElementById("hours").innerText = h < 10 ? "0" + h : h;
            document.getElementById("mins").innerText = m < 10 ? "0" + m : m;
            document.getElementById("secs").innerText = s < 10 ? "0" + s : s;
        }

        setInterval(countdown, 1000);
        countdown();
    </script>
</body>
</html>
