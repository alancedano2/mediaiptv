<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>WWE: Clash In Italy - Live Countdown</title>
    <style>
        body {
            margin: 0;
            height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            background-color: transparent; 
            font-family: 'Inter', 'Segoe UI', sans-serif;
        }

        .glass-box {
            display: flex;
            align-items: center;
            background: rgba(0, 0, 0, 0.85); 
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            
            padding: 35px 60px;
            border-radius: 20px; 
            
            /* Cambiado a Verde Neón */
            border: 2px solid #39ff14;
            box-shadow: 0 0 25px rgba(57, 255, 20, 0.6), 
                        inset 0 0 10px rgba(57, 255, 20, 0.3);
            
            color: white;
            gap: 50px;
        }

        .info h1 {
            margin: 0;
            font-size: 32px;
            font-weight: 900;
            text-transform: uppercase;
            letter-spacing: -1px;
            color: #39ff14; /* Verde */
            text-shadow: 0 0 10px rgba(57, 255, 20, 0.5);
        }

        .info p {
            margin: 5px 0 0;
            font-size: 17px;
            color: #eee;
        }

        .divider {
            width: 2px;
            height: 80px;
            background: #39ff14; /* Verde */
            box-shadow: 0 0 12px #39ff14;
            opacity: 0.7;
        }

        .timer {
            display: flex;
            gap: 30px;
            text-align: center;
        }

        .time-group {
            display: flex;
            flex-direction: column;
        }

        .time-group b {
            font-size: 48px;
            font-weight: 900;
            line-height: 1;
            color: #ffffff;
            text-shadow: 0 0 15px rgba(57, 255, 20, 0.7); /* Verde */
        }

        .time-group span {
            font-size: 11px;
            text-transform: uppercase;
            margin-top: 8px;
            letter-spacing: 2px;
            color: #39ff14; /* Verde */
            font-weight: 600;
        }
    </style>
</head>
<body>

    <div class="glass-box">
        <div class="info">
            <h1>WWE: CLASH IN ITALY</h1>
            <p>Domingo, 31 de mayo • 12:00 PM</p>
        </div>

        <div class="divider"></div>

        <div class="timer">
            <div class="time-group">
                <b id="days">00</b>
                <span>Días</span>
            </div>
            <div class="time-group">
                <b id="hours">00</b>
                <span>Hrs</span>
            </div>
            <div class="time-group">
                <b id="mins">00</b>
                <span>Min</span>
            </div>
            <div class="time-group">
                <b id="secs">00</b>
                <span>Seg</span>
            </div>
        </div>
    </div>

    <script>
        const targetDate = new Date(2026, 4, 31, 12, 0, 0).getTime();

        function countdown() {
            const currentTime = new Date().getTime();
            const gap = targetDate - currentTime;

            if (gap <= 0) {
                document.querySelector(".timer").innerHTML = "<b style='color:#39ff14; font-size:30px; text-shadow: 0 0 10px rgba(57,255,20,0.5);'>¡AL AIRE!</b>";
                return;
            }

            const d = Math.floor(gap / (1000 * 60 * 60 * 24));
            const h = Math.floor((gap % (1000 * 60 * 60 * 24)) / (1000 * 60 * 60));
            const m = Math.floor((gap % (1000 * 60 * 60)) / (1000 * 60));
            const s = Math.floor((gap % (1000 * 60)) / 1000);

            document.getElementById("days").innerText = d < 10 ? "0" + d : d;
            document.getElementById("hours").innerText = h < 10 ? "0" + h : h;
            document.getElementById("mins").innerText = m < 10 ? "0" + m : m;
            document.getElementById("secs").innerText = s < 10 ? "0" + s : s;
        }

        setInterval(countdown, 1000);
        countdown();
    </script>
</body>
</html>
