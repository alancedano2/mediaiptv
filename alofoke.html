<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>México vs. Inglaterra - Cuenta Regresiva</title>
    <style>
        body {
            margin: 0;
            height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            background-color: transparent; 
            font-family: 'Inter', 'Segoe UI', sans-serif;
        }

        .glass-box {
            display: flex;
            align-items: center;
            background: rgba(10, 10, 10, 0.9); 
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            
            padding: 35px 60px;
            border-radius: 20px; 
            
            /* Elegante borde naranja estilo deportivo/premium */
            border: 2px solid #FF6A00;
            box-shadow: 0 0 25px rgba(255, 106, 0, 0.5), 
                        inset 0 0 10px rgba(255, 106, 0, 0.2);
            
            color: white;
            gap: 50px;
        }

        .info h1 {
            margin: 0;
            font-size: 28px;
            font-weight: 900;
            text-transform: uppercase;
            letter-spacing: 0.5px;
            color: #ffffff;
            text-shadow: 0 0 10px rgba(255, 255, 255, 0.3);
        }

        .info .teams {
            color: #FF6A00; /* Naranja */
            font-size: 32px;
            font-weight: 900;
            margin: 2px 0;
            text-transform: uppercase;
        }

        .info p {
            margin: 8px 0 0;
            font-size: 16px;
            color: #bbb;
            font-weight: 500;
            letter-spacing: 1px;
        }

        .divider {
            width: 2px;
            height: 90px;
            background: #FF6A00; /* Naranja */
            box-shadow: 0 0 12px #FF6A00;
            opacity: 0.7;
        }

        .timer {
            display: flex;
            gap: 30px;
            text-align: center;
        }

        .time-group {
            display: flex;
            flex-direction: column;
        }

        .time-group b {
            font-size: 48px;
            font-weight: 900;
            line-height: 1;
            color: #ffffff;
            text-shadow: 0 0 15px rgba(255, 106, 0, 0.6); 
        }

        .time-group span {
            font-size: 11px;
            text-transform: uppercase;
            margin-top: 8px;
            letter-spacing: 2px;
            color: #FF6A00; /* Naranja */
            font-weight: 600;
        }
    </style>
</head>
<body>

    <div class="glass-box">
        <div class="info">
            <h1>BSN Playoffs</h1>
            <div class="teams">Gigantes vs. Vaqueros</div>
            <p>13 JULIO 2026 • 8:00 PM</p>
        </div>

        <div class="divider"></div>

        <div class="timer">
            <div class="time-group">
                <b id="days">00</b>
                <span>Días</span>
            </div>
            <div class="time-group">
                <b id="hours">00</b>
                <span>Hrs</span>
            </div>
            <div class="time-group">
                <b id="mins">00</b>
                <span>Min</span>
            </div>
            <div class="time-group">
                <b id="secs">00</b>
                <span>Seg</span>
            </div>
        </div>
    </div>

    <script>
        // Configura la fecha objetivo exacta: 5 de Julio de 2026 a las 20:00 (8:00 PM)
        // Nota: Los meses en JavaScript empiezan desde 0 (0 = Enero, 6 = Julio)
        const targetDate = new Date(2026, 6, 13, 21, 0, 0, 0);
        const targetTime = targetDate.getTime();

        function countdown() {
            const currentTime = new Date().getTime();
            const gap = targetTime - currentTime;

            // Cuando empiece el evento cambiará el texto
            if (gap <= 0) {
                document.querySelector(".timer").innerHTML = "<b style='color:#FF6A00; font-size:30px; text-shadow: 0 0 10px rgba(255,106,0,0.5);'>¡PARTIDO EN VIVO!</b>";
                return;
            }

            const d = Math.floor(gap / (1000 * 60 * 60 * 24));
            const h = Math.floor((gap % (1000 * 60 * 60 * 24)) / (1000 * 60 * 60));
            const m = Math.floor((gap % (1000 * 60 * 60)) / (1000 * 60));
            const s = Math.floor((gap % (1000 * 60)) / 1000);

            document.getElementById("days").innerText = d < 10 ? "0" + d : d;
            document.getElementById("hours").innerText = h < 10 ? "0" + h : h;
            document.getElementById("mins").innerText = m < 10 ? "0" + m : m;
            document.getElementById("secs").innerText = s < 10 ? "0" + s : s;
        }

        setInterval(countdown, 1000);
        countdown();
    </script>
</body>
</html>
